name: nexora-merchant-platform

services:
  api-gateway:
    build:
      context: ../..
      dockerfile: apps/api-gateway/Dockerfile
    environment:
      NEXORA_ENV: development
      NEXORA_CURRENCY: USD
      PORT: 4000
    ports:
      - "4000:4000"
    depends_on:
      - financial-core
      - transaction-service
      - merchant-service
    networks:
      - nexora

  dashboard:
    build:
      context: ../..
      dockerfile: apps/dashboard/Dockerfile
    environment:
      NEXORA_ENV: development
      PORT: 4001
    ports:
      - "4001:4001"
    depends_on:
      - api-gateway
    networks:
      - nexora

  pos:
    build:
      context: ../..
      dockerfile: apps/pos/Dockerfile
    environment:
      NEXORA_ENV: development
      PORT: 4002
    ports:
      - "4002:4002"
    depends_on:
      - api-gateway
    networks:
      - nexora

  financial-core:
    build:
      context: ../..
      dockerfile: services/financial-core/Dockerfile
    environment:
      NEXORA_ENV: development
      NEXORA_CURRENCY: USD
      PORT: 4100
    networks:
      - nexora

  transaction-service:
    build:
      context: ../..
      dockerfile: services/transaction-service/Dockerfile
    environment:
      NEXORA_ENV: development
      PORT: 4101
    networks:
      - nexora

  merchant-service:
    build:
      context: ../..
      dockerfile: services/merchant-service/Dockerfile
    environment:
      NEXORA_ENV: development
      PORT: 4102
    networks:
      - nexora

networks:
  nexora:
    driver: bridge
