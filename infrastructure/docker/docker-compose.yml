# LECIPM — local dev stack (Postgres + apps/web + auth-service)
# Run from repo root: docker compose -f infrastructure/docker/docker-compose.yml up -d

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: lecipm
      POSTGRES_PASSWORD: lecipm
      POSTGRES_DB: lecipm
    ports:
      - "5432:5432"
    volumes:
      - lecipm_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lecipm -d lecipm"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Uncomment to run auth-service in Docker (or run locally with npm run dev:auth)
  # auth-service:
  #   build:
  #     context: ../..
  #     dockerfile: services/auth-service/Dockerfile
  #   ports:
  #     - "3001:3001"
  #   environment:
  #     DATABASE_URL: postgresql://lecipm:lecipm@postgres:5432/lecipm
  #     JWT_ACCESS_SECRET: dev-access-secret-min-32-characters
  #     JWT_REFRESH_SECRET: dev-refresh-secret-min-32-characters
  #   depends_on:
  #     postgres:
  #       condition: service_healthy

volumes:
  lecipm_pgdata: {}
