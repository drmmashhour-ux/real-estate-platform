name: Deploy to Hetzner Cloud

on:
  push:
    branches:
      - main
      - feature/locale-routing-security-observability-platform

jobs:
  deploy:
    name: Deploy to Ubuntu Server
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          password: ${{ secrets.HETZNER_PASSWORD }}
          command_timeout: 45m
          script: |
            set -e
            # 0. Ensure Swap (for builds on low-RAM servers)
            if ! free | grep -i swap | grep -qv "0"; then
              echo "No swap detected. Preparing swap..."
              if [ ! -f "/swapfile" ]; then
                echo "Creating 8G swap file..."
                fallocate -l 8G /swapfile || dd if=/dev/zero of=/swapfile bs=1M count=8192
                chmod 600 /swapfile
                mkswap /swapfile
              fi
              echo "Enabling swap..."
              swapon /swapfile || true
              if ! grep -q "/swapfile" /etc/fstab; then
                echo '/swapfile none swap sw 0 0' | tee -a /etc/fstab || true
              fi
            fi

            # 1. Navigate to app directory (create if missing)
            mkdir -p /var/www/lecipm
            cd /var/www/lecipm

            # 2. Sync Code
            if [ ! -d ".git" ]; then
              git clone https://github.com/drmmashhour-ux/real-estate-platform.git .
            else
              git fetch origin
              git reset --hard origin/${{ github.ref_name }}
              git clean -fd
            fi

            # 3. Environment Setup (Ensure .env exists)
            # You should manually create /var/www/lecipm/apps/web/.env.production on the server once
            # This script will link it or ensure it is present
            if [ -f "apps/web/.env.production" ]; then
              cp apps/web/.env.production apps/web/.env
            fi

            # 4. Install Dependencies
            # Ensure pnpm is installed on the server
            export PATH=$PATH:/root/.local/share/pnpm:/root/.nvm/versions/node/v20.x/bin
            export NODE_OPTIONS="--max-old-space-size=4096"
            pnpm install --frozen-lockfile

            # 5. Build
            pnpm --filter @lecipm/web... build

            # 6. Restart/Start with PM2
            # Ensure pm2 is installed
            if ! command -v pm2 &> /dev/null; then
              npm install -g pm2
            fi
            pm2 delete lecipm-web || true
            pm2 start "pnpm start --filter @lecipm/web" --name "lecipm-web"
            pm2 save
