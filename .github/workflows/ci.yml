# BNHub / LECIPM — CI (required for team workflow: lint + build must pass on PRs)
name: CI

permissions:
  contents: read

on:
  push:
    branches: [main, develop]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  quality:
    name: Lint, validate, build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prisma schema (apps/web)
        run: pnpm --filter @lecipm/web exec prisma validate

      - name: Lint
        run: pnpm run lint

      - name: Build (web, admin, modules, packages)
        run: pnpm run build:ci
