# BNHub / LECIPM — continuous integration
# Fails the PR/branch if lint, Prisma validation, build, or tests fail.
name: CI

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  quality:
    name: Lint, validate, build, test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js (LTS)
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prisma schema (apps/web)
        run: pnpm --filter @lecipm/web exec prisma validate

      - name: Lint
        run: pnpm run lint

      - name: Build (web, admin, modules, packages)
        run: pnpm run build:ci

      - name: Tests (placeholder — does not fail CI yet)
        run: pnpm test || echo "No tests yet or test run skipped"

      - name: Dependency audit (informational)
        run: pnpm audit --audit-level=high
        continue-on-error: true
