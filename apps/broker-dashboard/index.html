<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LECIPM Broker Dashboard</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; max-width: 480px; margin: 2rem auto; padding: 0 1rem; }
    h1 { font-size: 1.25rem; }
    form { display: flex; flex-direction: column; gap: 0.75rem; margin-top: 1.5rem; }
    input { padding: 0.5rem; border: 1px solid #ccc; border-radius: 4px; }
    button { padding: 0.6rem 1rem; background: #111; color: #fff; border: none; border-radius: 4px; cursor: pointer; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .error { color: #c00; font-size: 0.9rem; margin-top: 0.5rem; }
    .dashboard { display: none; margin-top: 1.5rem; padding: 1rem; background: #f5f5f5; border-radius: 8px; }
    .dashboard.visible { display: block; }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <h1>LECIPM Broker Dashboard</h1>
  <p>Placeholder app — login and dashboard. Set <code>window.API_URL</code> or use default auth URL.</p>

  <div id="loginSection">
    <form id="loginForm">
      <input type="email" id="email" placeholder="Email" required />
      <input type="password" id="password" placeholder="Password" required />
      <button type="submit" id="loginBtn">Sign in</button>
    </form>
    <div id="loginError" class="error hidden"></div>
  </div>

  <div id="dashboardSection" class="dashboard">
    <p><strong>Dashboard placeholder.</strong> Authenticated as <span id="userEmail"></span>.</p>
    <p>API connection: auth service base URL. Replace with full broker API when ready.</p>
    <button type="button" id="logoutBtn">Sign out</button>
  </div>

  <script src="app.js"></script>
</body>
</html>
