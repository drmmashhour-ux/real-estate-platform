<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 160" role="img" aria-labelledby="logoTitle logoDesc">
  <title id="logoTitle">Le Carrefour Immobilier Prestige</title>
  <desc id="logoDesc">Gold luxury monogram and serif wordmark on dark background</desc>
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8C547"/>
      <stop offset="45%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#9A7B2E"/>
    </linearGradient>
    <linearGradient id="goldRing" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F0D878"/>
      <stop offset="100%" stop-color="#B8922B"/>
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Icon seal -->
  <circle cx="80" cy="80" r="72" fill="#0B0B0B" stroke="url(#goldRing)" stroke-width="2.5"/>
  <circle cx="80" cy="80" r="58" fill="none" stroke="#D4AF37" stroke-width="0.6" opacity="0.35"/>
  <text x="80" y="92" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="36" font-weight="700" fill="url(#goldGrad)" letter-spacing="-1.5">CIPM</text>
  <!-- Wordmark -->
  <text x="168" y="52" font-family="Georgia, 'Times New Roman', serif" font-size="20" font-weight="600" fill="url(#goldGrad)" letter-spacing="0.02em">Le Carrefour Immobilier</text>
  <text x="168" y="82" font-family="Georgia, 'Times New Roman', serif" font-size="22" font-weight="600" fill="url(#goldGrad)" letter-spacing="0.02em">Prestige</text>
  <text x="168" y="118" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#B3B3B3" letter-spacing="0.28em">WHERE PRESTIGE MEETS SMART REAL ESTATE</text>
</svg>
