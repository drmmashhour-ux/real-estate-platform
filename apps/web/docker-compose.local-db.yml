services:
  postgres:
    image: postgres:16
    container_name: lecipm-local-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: lecipm_dev
    ports:
      - "5433:5432"
    volumes:
      - lecipm-local-postgres-data:/var/lib/postgresql/data

volumes:
  lecipm-local-postgres-data:
