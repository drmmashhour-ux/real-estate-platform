<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>LECIPM Mobile</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; margin: 0; padding: 1rem; min-height: 100vh; }
    h1 { font-size: 1.25rem; }
    form { display: flex; flex-direction: column; gap: 0.75rem; margin-top: 1.5rem; }
    input { padding: 0.75rem; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; }
    button { padding: 0.75rem; background: #111; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 1rem; }
    .dashboard { display: none; margin-top: 1.5rem; padding: 1rem; background: #f5f5f5; border-radius: 8px; }
    .dashboard.visible { display: block; }
    .hidden { display: none !important; }
    .error { color: #c00; margin-top: 0.5rem; }
  </style>
</head>
<body>
  <h1>LECIPM Mobile (Web placeholder)</h1>
  <p>Login and dashboard placeholder. Set <code>window.API_URL</code> for API base (default: auth service).</p>

  <div id="loginSection">
    <form id="loginForm">
      <input type="email" id="email" placeholder="Email" required />
      <input type="password" id="password" placeholder="Password" required />
      <button type="submit" id="loginBtn">Sign in</button>
    </form>
    <div id="loginError" class="error hidden"></div>
  </div>

  <div id="dashboardSection" class="dashboard">
    <p><strong>Dashboard placeholder.</strong> Signed in as <span id="userEmail"></span>.</p>
    <button type="button" id="logoutBtn">Sign out</button>
  </div>

  <script src="app.js"></script>
</body>
</html>
